<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Login</title>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <main class="page-wrapper">

    <section class="login-container">

      <div class="app-branding">
        <div class="logo-area">
          <i data-lucide="leaf"></i>
        </div>
        <p>Simple and reliable point-of-sale system</p>
      </div>

      <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Log in to continue managing your store</p>

        <form class="login-form" id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <p id="email-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <p id="password-error" class="form-error"></p>
          </div>

          <p id="login-error" class="form-error"></p>

          <button type="submit" class="submit-button">
            Login
          </button>
        </form>

        <p class="register-link">
          Don't have an account?
          <a href="pages/auth/register.html">Create an account</a>
        </p>
      </div>
    </section>

  </main>

  <script src="js/core/api.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/auth.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
