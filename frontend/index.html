<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TindaTrack | Login</title>

  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  
  <main class="page-wrapper">

    <section class="login-container">

      <div class="app-branding">
        <div class="logo-area">
          TindaTrack
        </div>

        <p>Simple and reliable point-of-sale system</p>
      </div>

      <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Log in to continue managing your store</p>
        
        <form class="login-form" id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <p id="email-error" class="form-error"></p>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <p id="password-error" class="form-error"></p>
          </div>

          <p id="login-error" class="form-error"></p>

          <button type="submit" class="submit-button">
            Login
          </button>
        </form>

        <p class="register-link">
          Don't have an account?
          <a href="register.html">Create an account</a>
        </p>
      </div>
    </section>

  </main>

  <script src="js/auth.js"></script>
</body>
</html>
