<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Products</title>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/inventory.css">
  <link rel="stylesheet" href="../css/pages/products.css">
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo-box">
          <i data-lucide="leaf"></i>
        </div>
        <span class="sidebar-app-name nav-link-text">Celso POS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span class="nav-link-text">Dashboard</span>
        </a>
        <a href="order.html" class="nav-link" data-page="order">
          <i data-lucide="shopping-cart"></i>
          <span class="nav-link-text">New Order</span>
        </a>
        <a href="inventory.html" class="nav-link" data-page="inventory">
          <i data-lucide="archive"></i>
          <span class="nav-link-text">Inventory</span>
        </a>
        <a href="products.html" class="nav-link" data-page="products">
          <i data-lucide="package"></i>
          <span class="nav-link-text">Products</span>
        </a>
        <a href="analytics.html" class="nav-link" data-page="analytics">
          <i data-lucide="bar-chart-2"></i>
          <span class="nav-link-text">Analytics</span>
        </a>
        <a href="history.html" class="nav-link" data-page="history">
          <i data-lucide="clock"></i>
          <span class="nav-link-text">History</span>
        </a>
      </nav>

      <div class="sidebar-user-area">

        <div class="user-popup" id="user-popup">
          <a href="account.html" class="user-popup-item">
            <i data-lucide="user"></i>
            Account Settings
          </a>
          <button
            type="button"
            class="user-popup-item logout-item"
            id="logout-button"
          >
            <i data-lucide="log-out"></i>
            Logout
          </button>
        </div>

        <div class="sidebar-user-card" id="user-menu-trigger">
          <div class="user-avatar" id="user-avatar">--</div>
          <div class="user-info">
            <p class="user-name" id="user-name">User</p>
            <p class="user-role">Cashier</p>
          </div>
        </div>

      </div>
    </aside>

    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <h1 id="page-title">Products</h1>

        <div class="topbar-actions">

          <button
            type="button"
            class="topbar-icon-button"
            id="theme-toggle"
            title="Toggle theme"
          >
            <i data-lucide="moon" id="theme-icon"></i>
          </button>

          <div class="notif-wrapper">
            <button
              type="button"
              class="topbar-icon-button"
              id="notif-btn"
              title="Notifications"
            >
              <i data-lucide="bell"></i>
              <span class="notif-badge" id="notif-badge" style="display:none">0</span>
            </button>
          </div>

        </div>
      </header>

      <main class="page-body">

        <section class="page-section">
          <div class="products-header">
            <div>
              <h2>Products & Pricing</h2>
              <p>View, add, edit, and delete store products</p>
            </div>

            <button type="button" class="submit-button add-product-button" id="add-product-button">
              Add Product
            </button>
          </div>

          <div class="products-toolbar">
            <input
              type="text"
              id="product-search"
              class="search-input"
              placeholder="Search product by name"
            />
            <select id="product-category-select" class="filter-select">
              <!-- Options rendered by JS -->
            </select>
          </div>

          <div class="table-wrapper">
            <table class="data-table" id="products-table">
              <thead>
                <tr>
                  <th>Product Name</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Cost</th>
                  <th class="actions-col"></th>
                </tr>
              </thead>
              <tbody id="products-table-body">
                <!-- Product rows will be rendered by products.js -->
              </tbody>
            </table>
          </div>
        </section>

      </main>

    </div>
  </div>

  <div class="modal-overlay" id="product-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Add Product</h2>
        <button type="button" class="modal-close-button" id="close-modal-button">
          ×
        </button>
      </div>

      <form id="product-form" class="product-form" autocomplete="off">
        <div class="form-group">
          <label for="product-name">Product Name</label>
          <input
            type="text"
            id="product-name"
            name="product-name"
            placeholder="Enter product name"
            required
            autocomplete="off"
          />
          <p id="product-name-error" class="form-error"></p>
        </div>

        <div class="form-group">
          <label for="product-category">Category</label>
          <input
            type="text"
            id="product-category"
            name="product-category"
            placeholder="Enter category"
            required
            autocomplete="off"
          />
          <p id="product-category-error" class="form-error"></p>
        </div>

        <div class="form-row form-row-3">
          <div class="form-group">
            <label for="product-price">Price</label>
            <input
              type="number"
              id="product-price"
              name="product-price"
              class="no-spinner"
              placeholder="0.00"
              required
              autocomplete="off"
            />
            <p id="product-price-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="product-cost">Cost</label>
            <input
              type="number"
              id="product-cost"
              name="product-cost"
              class="no-spinner"
              placeholder="0.00"
              required
              autocomplete="off"
            />
            <p id="product-cost-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="product-unit">Unit</label>
            <select id="product-unit" name="product-unit" required>
              <option value="">Select unit</option>
              <option value="piece">piece</option>
              <option value="pack">pack</option>
              <option value="bottle">bottle</option>
              <option value="sachet">sachet</option>
              <option value="can">can</option>
            </select>
            <p id="product-unit-error" class="form-error"></p>
          </div>
        </div>

        <div class="modal-actions">
          <button type="submit" class="submit-button">
            Save Product
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/components/sidebar.js"></script>
  <script src="../js/core/theme.js"></script>
  <script src="../js/core/api.js"></script>
  <script src="../js/core/utils.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/core/data.js"></script>
  <script src="../js/components/notifications.js"></script>
  <script src="../js/pages/products.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
